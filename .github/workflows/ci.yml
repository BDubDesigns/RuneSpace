name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fast-checks:
    name: Install, typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Production build
        # The production build imports server/env.ts which validates DATABASE_URL
        # (and Better Auth requires BETTER_AUTH_SECRET). CI has no database and no
        # real auth secret, so syntactically valid placeholders are sufficient; no
        # real connection is made during `next build`. These are scoped to this step
        # only so that the earlier `pnpm install` keeps devDependencies
        # (NODE_ENV=production would skip them).
        env:
          DATABASE_URL: postgres://runespace:runespace@localhost:5432/runespace
          NODE_ENV: production
          # Insecure placeholder used ONLY for the CI build step. Real deployments
          # MUST set a strong BETTER_AUTH_SECRET; server/env.ts requires it at runtime.
          BETTER_AUTH_SECRET: "insecure-ci-build-only-secret-do-not-use-in-prod-0000000000"
          BETTER_AUTH_URL: "http://localhost:3000"
          RUNESPACE_RELEASE_ID: ${{ github.sha }}
        run: pnpm build

  integration:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: runespace
          POSTGRES_PASSWORD: runespace
          POSTGRES_DB: runespace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runespace -d runespace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://runespace:runespace@localhost:5432/runespace
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm drizzle-kit migrate

      - name: PostgreSQL integration tests
        run: pnpm test:integration

  mining-e2e:
    name: Mining browser journey
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: runespace
          POSTGRES_PASSWORD: runespace
          POSTGRES_DB: runespace
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U runespace -d runespace"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://runespace:runespace@localhost:5432/runespace
      BETTER_AUTH_SECRET: insecure-ci-browser-only-secret-do-not-use-in-prod-0000000000
      BETTER_AUTH_URL: http://127.0.0.1:3000
      RUNESPACE_RELEASE_ID: ${{ github.sha }}
      CI: true
      RUNESPACE_E2E_MINING: true
      RUNESPACE_E2E_PLAY_ERROR: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm drizzle-kit migrate
      - run: pnpm test:e2e mining --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mining-playwright-report
          path: |
            playwright-report/
            test-results/
